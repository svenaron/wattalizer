name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install desktop libs
        run: >
          sudo apt-get install -y
          xvfb libgtk-3-dev libblkid-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - uses: actions/cache@v4
        id: gen-cache
        with:
          path: |
            lib/data/database/database.g.dart
            .dart_tool/build/
          key: buildrunner-${{ hashFiles('pubspec.lock', 'lib/data/database/tables.dart', 'lib/data/database/database.dart') }}

      - name: Run code generation
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux debug
        run: flutter build linux --debug

      - name: Launch and verify
        run: >
          xvfb-run --auto-servernum
          timeout 15s
          ./build/linux/x64/debug/bundle/wattalizer
          || [ $? -eq 124 ]

  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - uses: actions/cache@v4
        id: gen-cache
        with:
          path: |
            lib/data/database/database.g.dart
            .dart_tool/build/
          key: buildrunner-${{ hashFiles('pubspec.lock', 'lib/data/database/tables.dart', 'lib/data/database/database.dart') }}

      - name: Run code generation
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows debug
        run: flutter build windows --debug

      - name: Launch and verify
        shell: pwsh
        run: |
          $p = Start-Process -PassThru `
            "build\windows\x64\runner\Debug\wattalizer.exe"
          Start-Sleep 10
          if ($p.HasExited -and $p.ExitCode -ne 0) { exit 1 }
          Stop-Process -Id $p.Id -ErrorAction SilentlyContinue

  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - uses: actions/cache@v4
        id: gen-cache
        with:
          path: |
            lib/data/database/database.g.dart
            .dart_tool/build/
          key: buildrunner-${{ hashFiles('pubspec.lock', 'lib/data/database/tables.dart', 'lib/data/database/database.dart') }}

      - name: Run code generation
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS debug
        run: flutter build macos --debug

      - name: Launch and verify
        run: |
          "build/macos/Build/Products/Debug/Wattalizer.app/Contents/MacOS/wattalizer" &
          PID=$!
          sleep 15
          if kill -0 $PID 2>/dev/null; then
            kill $PID
          else
            wait $PID
            [ $? -eq 0 ] || exit 1
          fi

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Pre-install Android CMake
        run: >
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          "cmake;3.22.1"

      - name: Install dependencies
        run: flutter pub get

      - uses: actions/cache@v4
        id: gen-cache
        with:
          path: |
            lib/data/database/database.g.dart
            .dart_tool/build/
          key: buildrunner-${{ hashFiles('pubspec.lock', 'lib/data/database/tables.dart', 'lib/data/database/database.dart') }}

      - name: Run code generation
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --debug --split-per-abi --target-platform android-arm64

      - name: Verify APK exists
        run: ls build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - uses: actions/cache@v4
        id: gen-cache
        with:
          path: |
            lib/data/database/database.g.dart
            .dart_tool/build/
          key: buildrunner-${{ hashFiles('pubspec.lock', 'lib/data/database/tables.dart', 'lib/data/database/database.dart') }}

      - name: Run code generation
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign

      - name: Verify .app exists
        run: ls build/ios/iphoneos/Runner.app
