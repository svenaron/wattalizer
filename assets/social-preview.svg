<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB200"/>
      <stop offset="100%" style="stop-color:#E04800"/>
    </linearGradient>
    <linearGradient id="sl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#E05800;stop-opacity:0"/>
      <stop offset="35%"  style="stop-color:#E05800;stop-opacity:1"/>
      <stop offset="70%"  style="stop-color:#E05800;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#E05800;stop-opacity:0"/>
    </linearGradient>
    <!-- subtle glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB200;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFB200;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="640" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="640" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Glow behind icon -->
  <ellipse cx="220" cy="320" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Icon: white rounded square -->
  <rect x="80" y="180" width="280" height="280" rx="52" fill="#FFFFFF"/>

  <!-- Icon speedlines -->
  <rect x="88" y="307" width="264" height="3"  rx="1.5" fill="url(#sl)" opacity="0.3"/>
  <rect x="88" y="313" width="264" height="5"  rx="2.5" fill="url(#sl)" opacity="0.55"/>
  <rect x="88" y="321" width="264" height="5"  rx="2.5" fill="url(#sl)" opacity="0.55"/>
  <rect x="88" y="329" width="264" height="3"  rx="2.5" fill="url(#sl)" opacity="0.3"/>

  <!-- Icon W glyph (scaled/translated to fit 80,180 + 280×280 box) -->
  <g transform="translate(220,320) scale(0.182) translate(-512,-512)">
    <path d="M 96,175 L 146,175 Q 154,175 156.7,182.5 L 311.5,613.4 Q 325,651 341.5,614.5 L 495.5,273.5 Q 512,237 528.5,273.5 L 682.5,614.5 Q 699,651 712.5,613.4 L 867.3,182.5 Q 870,175 878,175 L 928,175 Q 944,175 938.7,190.1 L 720.3,811.3 Q 707,849 690.5,812.5 L 528.5,453.5 Q 512,417 495.5,453.5 L 333.5,812.5 Q 317,849 303.7,811.3 L 85.3,190.1 Q 80,175 96,175 Z"
      fill="url(#wgrad)"/>
  </g>

  <!-- App name -->
  <text x="420" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Wattalizer</text>

  <!-- Tagline -->
  <text x="422" y="366" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="400" fill="#FFB200">Sprint power analysis for track cyclists</text>

  <!-- Platform line -->
  <text x="422" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#888888">macOS · Windows · Linux</text>

  <!-- Divider -->
  <line x1="420" y1="458" x2="860" y2="458" stroke="#333333" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- MAP Curves pill -->
  <rect x="420" y="480" width="158" height="36" rx="18" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="499" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#cccccc" text-anchor="middle">MAP curves</text>

  <!-- BLE pill -->
  <rect x="590" y="480" width="110" height="36" rx="18" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="645" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#cccccc" text-anchor="middle">BLE sensors</text>

  <!-- Import pill -->
  <rect x="712" y="480" width="148" height="36" rx="18" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="786" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#cccccc" text-anchor="middle">TCX/FIT import</text>

  <!-- Personal records pill -->
  <rect x="872" y="480" width="172" height="36" rx="18" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="958" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#cccccc" text-anchor="middle">Personal records</text>

</svg>
